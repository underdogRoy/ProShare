version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity:
    build:
      context: .
      dockerfile: services/identity/Dockerfile
    environment:
      IDENTITY_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/proshare_identity
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://127.0.0.1:5173}
      IDENTITY_SHOW_RESET_LINK: ${IDENTITY_SHOW_RESET_LINK:-false}
      SMTP_PROVIDER: ${SMTP_PROVIDER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-0}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ProShare}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    depends_on: [postgres]
    depends_on:
      postgres:
        condition: service_healthy
    ports: ['8001:8000']

  content:
    build:
      context: .
      dockerfile: services/content/Dockerfile
    environment:
      CONTENT_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/proshare_content
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
    ports: ['8002:8000']

  engagement:
    build:
      context: .
      dockerfile: services/engagement/Dockerfile
    environment:
      ENGAGEMENT_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/proshare_engagement
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
    ports: ['8003:8000']

  summary:
    build:
      context: .
      dockerfile: services/summary/Dockerfile
    environment:
      SUMMARY_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/proshare_summary
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ['8004:8000']

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      IDENTITY_URL: http://identity:8000
      CONTENT_URL: http://content:8000
      ENGAGEMENT_URL: http://engagement:8000
      SUMMARY_URL: http://summary:8000
    depends_on: [identity, content, engagement, summary]
    ports: ['8000:8000']

volumes:
  pgdata:
