version: '3.9'
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ../.env.example
    depends_on:
      - db
      - redis
      - ai

  ai:
    build:
      context: ../ai
      dockerfile: Dockerfile
    ports:
      - '8100:8100'
    env_file:
      - ../.env.example
    depends_on:
      - redis

  ai-worker:
    build:
      context: ../ai
      dockerfile: Dockerfile.worker
    env_file:
      - ../.env.example
    depends_on:
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: proshare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  pgdata:
